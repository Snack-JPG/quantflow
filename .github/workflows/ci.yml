name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend Python Tests
  backend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio black mypy

    - name: Lint with black
      run: |
        cd backend
        black --check .
      continue-on-error: true

    - name: Type check with mypy
      run: |
        cd backend
        mypy app/ --ignore-missing-imports
      continue-on-error: true

    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
      continue-on-error: true

  # Frontend Next.js Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint
      run: |
        cd frontend
        npm run lint
      continue-on-error: true

    - name: Type check
      run: |
        cd frontend
        npm run type-check
      continue-on-error: true

    - name: Build
      run: |
        cd frontend
        npm run build

    - name: Test
      run: |
        cd frontend
        npm test -- --passWithNoTests
      continue-on-error: true

  # Docker Build Test
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      run: |
        docker build -t quantflow-backend:test ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build -t quantflow-frontend:test ./frontend

    - name: Build Connector Docker Image
      run: |
        docker build -f backend/Dockerfile.connector -t quantflow-connector:test ./backend

    - name: Docker Compose Validation
      run: |
        docker-compose config

  # Performance Benchmarks (on main branch only)
  benchmark:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest-benchmark

    - name: Run benchmarks
      run: |
        cd backend
        pytest tests/benchmarks/ --benchmark-only --benchmark-json=benchmark.json
      continue-on-error: true

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: backend/benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: false
      continue-on-error: true