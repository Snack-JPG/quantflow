services:
  # API Gateway
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantflow-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://quantflow:quantflow@timescaledb:5432/quantflow
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    depends_on:
      - redis
      - timescaledb
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop uvloop
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - quantflow-network

  # TimescaleDB for time-series storage
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quantflow-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=quantflow
      - POSTGRES_USER=quantflow
      - POSTGRES_PASSWORD=quantflow
      - TS_TUNE_MAX_CONNS=100
      - TS_TUNE_MEMORY=4GB
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantflow-network

  # Redis for pub/sub and caching
  redis:
    image: redis:7-alpine
    container_name: quantflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - quantflow-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - quantflow-network

networks:
  quantflow-network:
    driver: bridge

volumes:
  redis-data:
  timescale-data:
